name: Dependency Audit

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write # required to push to the wiki

jobs:
  audit-npm:
    name: Audit npm (Astro client)
    runs-on: ubuntu-latest
    outputs:
      vulnerability_report: ${{ steps.vuln.outputs.report }}
      outdated_report: ${{ steps.outdated.outputs.report }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci --prefer-offline || npm install

      - name: npm audit (vulnerabilities)
        id: vuln
        working-directory: client
        run: |
          set +e
          AUDIT_OUTPUT=$(npm audit --json 2>/dev/null)
          EXIT_CODE=$?
          set -e

          VULN_COUNT=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities | (.critical + .high + .moderate + .low + .info)' 2>/dev/null || echo "0")
          CRITICAL=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities.critical' 2>/dev/null || echo "0")
          HIGH=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities.high' 2>/dev/null || echo "0")
          MODERATE=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities.moderate' 2>/dev/null || echo "0")
          LOW=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities.low' 2>/dev/null || echo "0")

          if [ "$VULN_COUNT" -eq "0" ]; then
            VULN_TABLE="No vulnerabilities found."
          else
            VULN_TABLE=$(echo "$AUDIT_OUTPUT" | jq -r '
              "| Package | Severity | Via | Fix Available |",
              "|---------|----------|-----|---------------|",
              (.vulnerabilities // {} | to_entries[] |
                "| \(.key) | \(.value.severity) | \([.value.via[] | if type == "string" then . else .name // "indirect" end] | join(", ")) | \(if .value.fixAvailable == true then "Yes" elif .value.fixAvailable == false then "No" else "Breaking Change" end) |"
              )' 2>/dev/null || echo "Unable to parse vulnerability details.")
          fi

          REPORT="### npm Vulnerabilities\n\n"
          REPORT+="| Critical | High | Moderate | Low |\n"
          REPORT+="|----------|------|----------|-----|\n"
          REPORT+="| $CRITICAL | $HIGH | $MODERATE | $LOW |\n\n"
          REPORT+="$VULN_TABLE"

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: npm outdated
        id: outdated
        working-directory: client
        run: |
          set +e
          OUTDATED_OUTPUT=$(npm outdated --json 2>/dev/null)
          set -e

          if [ -z "$OUTDATED_OUTPUT" ] || [ "$OUTDATED_OUTPUT" = "{}" ]; then
            OUTDATED_TABLE="All packages are up to date."
          else
            OUTDATED_TABLE=$(echo "$OUTDATED_OUTPUT" | jq -r '
              "| Package | Current | Wanted | Latest |",
              "|---------|---------|--------|--------|",
              (to_entries[] | "| \(.key) | \(.value.current // "N/A") | \(.value.wanted // "N/A") | \(.value.latest // "N/A") |")
            ' 2>/dev/null || echo "Unable to parse outdated package details.")
          fi

          REPORT="### npm Outdated Packages\n\n$OUTDATED_TABLE"

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  audit-dotnet:
    name: Audit .NET (server)
    runs-on: ubuntu-latest
    outputs:
      vulnerability_report: ${{ steps.vuln.outputs.report }}
      outdated_report: ${{ steps.outdated.outputs.report }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.x"

      - name: Restore packages
        working-directory: server
        run: dotnet restore

      - name: dotnet list vulnerabilities
        id: vuln
        working-directory: server
        run: |
          set +e
          VULN_OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          set -e

          if echo "$VULN_OUTPUT" | grep -q "no vulnerable packages"; then
            VULN_TABLE="No vulnerable packages found."
          else
            VULN_TABLE=$(echo "$VULN_OUTPUT" | awk '
              BEGIN {
                print "| Package | Resolved Version | Severity | Advisory URL |"
                print "|---------|-----------------|----------|--------------|"
              }
              /^   >/ {
                pkg = $2; ver = $3; sev = $4; url = $5
                print "| " pkg " | " ver " | " sev " | " url " |"
              }
            ')
          fi

          REPORT="### .NET Vulnerabilities\n\n$VULN_TABLE"

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: dotnet list outdated
        id: outdated
        working-directory: server
        run: |
          set +e
          OUTDATED_OUTPUT=$(dotnet list package --outdated --include-transitive 2>&1)
          set -e

          if echo "$OUTDATED_OUTPUT" | grep -q "No packages were found"; then
            OUTDATED_TABLE="All packages are up to date."
          else
            OUTDATED_TABLE=$(echo "$OUTDATED_OUTPUT" | awk '
              BEGIN {
                print "| Package | Resolved | Latest |"
                print "|---------|----------|--------|"
              }
              /^   >/ {
                pkg = $2; resolved = $3; latest = $4
                print "| " pkg " | " resolved " | " latest " |"
              }
            ')
          fi

          REPORT="### .NET Outdated Packages\n\n$OUTDATED_TABLE"

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  publish-report:
    name: Publish Report to Wiki
    runs-on: ubuntu-latest
    needs: [audit-npm, audit-dotnet]
    if: always()
    steps:
      - name: Build markdown report
        env:
          NPM_VULN: ${{ needs.audit-npm.outputs.vulnerability_report }}
          NPM_OUTDATED: ${{ needs.audit-npm.outputs.outdated_report }}
          DOTNET_VULN: ${{ needs.audit-dotnet.outputs.vulnerability_report }}
          DOTNET_OUTDATED: ${{ needs.audit-dotnet.outputs.outdated_report }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          DATETIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Dated wiki page filename (spaces become hyphens in wiki URLs)
          PAGE_FILE="Dependency-Audit-${DATE}.md"
          echo "PAGE_FILE=$PAGE_FILE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

          cat > "$PAGE_FILE" <<MDEOF
          # Dependency Audit — ${DATETIME}

          **Workflow run:** [View on GitHub Actions](${RUN_URL})

          ---

          ## Astro Client (npm)

          ${NPM_VULN}

          ${NPM_OUTDATED}

          ---

          ## .NET Server

          ${DOTNET_VULN}

          ${DOTNET_OUTDATED}

          ---

          _[Back to audit index](Dependency-Audits)_
          MDEOF

      - name: Clone wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki
          git -C wiki config user.name "github-actions[bot]"
          git -C wiki config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Write dated report page
        run: cp "$PAGE_FILE" "wiki/$PAGE_FILE"

      - name: Update audit index page
        run: |
          INDEX="wiki/Dependency-Audits.md"

          # Build a sorted list of all existing audit pages (newest first)
          LINKS=$(ls wiki/Dependency-Audit-*.md 2>/dev/null | sort -r | while read f; do
            base=$(basename "$f" .md)
            date_part=${base#Dependency-Audit-}
            echo "- [${date_part}](${base})"
          done)

          cat > "$INDEX" <<IDXEOF
          # Dependency Audit Reports

          All audit runs, newest first. Each report covers npm (Astro client) and .NET (server) packages.

          ${LINKS}
          IDXEOF

      - name: Update wiki sidebar
        run: |
          SIDEBAR="wiki/_Sidebar.md"

          # Collect the 10 most recent audit entries for the sidebar
          RECENT=$(ls wiki/Dependency-Audit-*.md 2>/dev/null | sort -r | head -10 | while read f; do
            base=$(basename "$f" .md)
            date_part=${base#Dependency-Audit-}
            echo "- [${date_part}](${base})"
          done)

          cat > "$SIDEBAR" <<SEOF
          ## Dependency Audits

          [All reports](Dependency-Audits)

          **Recent runs:**

          ${RECENT}
          SEOF

      - name: Commit and push to wiki
        run: |
          cd wiki
          git add .
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: dependency audit report ${DATE}"
          git push
